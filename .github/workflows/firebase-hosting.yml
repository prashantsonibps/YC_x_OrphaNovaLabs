name: Deploy Firebase (Hosting + Functions)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  deploy_preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Deploy preview channel
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORPHANOVALABS }}"
          projectId: orphanovalabs
          channelId: "pr-${{ github.event.number }}"

  deploy_live:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Setup Firebase credentials
        run: |
          cat > "$RUNNER_TEMP/firebase-service-account.json" <<'EOF'
          ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORPHANOVALABS }}
          EOF
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/firebase-service-account.json" >> "$GITHUB_ENV"

      - name: Deploy Functions
        id: deploy_functions
        continue-on-error: true
        run: |
          npx firebase-tools deploy --project orphanovalabs --only functions --non-interactive

      - name: Deploy live channel (Hosting)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_ORPHANOVALABS }}"
          projectId: orphanovalabs
          channelId: live

      - name: Functions deploy status
        if: steps.deploy_functions.outcome == 'failure'
        run: |
          echo "::warning::Functions deploy failed. Hosting was deployed. Check IAM/billing/API enablement for Cloud Functions deployment."
